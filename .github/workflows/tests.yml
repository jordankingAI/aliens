name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run English unit tests
        run: python test_alien.py

      - name: Run Spanish unit tests
        run: python test_alien_es.py

      - name: Run dyslexia unit tests
        run: python test_alien_dyslexia.py

      - name: Run fix regression suite
        run: python test_fixes.py

      - name: Run system integration tests
        run: python test_system.py
